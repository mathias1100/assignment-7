<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2020 Proposal Form</title>
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <main id="wrapper">
    <h1>2020 Proposal Form</h1>

    <p id="form-instructions" class="instructions">
      Please complete the proposal form below. Fields marked with an asterisk
      (<span class="required-key" aria-hidden="true">*</span>) are required.
    </p>

    <form action="#" method="post" aria-describedby="form-instructions">
      <fieldset id="formcol1">
        <legend>Speaker Info</legend>
        <ul>
          <li>
            <label for="fstspkr1">First Name: <span class="required-key" aria-hidden="true">*</span></label>
            <input id="fstspkr1" name="fstspkr1" type="text" class="reqfield"
              autocomplete="given-name" required aria-required="true">
          </li>
          <li>
            <label for="lstname1">Last Name: <span class="required-key" aria-hidden="true">*</span></label>
            <input id="lstname1" name="lstname1" type="text" class="reqfield"
              autocomplete="family-name" required aria-required="true">
          </li>
          <li>
            <label for="spkrtitle1">Title:</label>
            <input id="spkrtitle1" name="spkrtitle1" type="text" maxlength="40"
              autocomplete="organization-title">
          </li>
          <li>
            <label for="company1">Company:</label>
            <input id="company1" name="company1" type="text" maxlength="60"
              autocomplete="organization">
          </li>
          <li>
            <label for="department1">Department:</label>
            <input id="department1" name="department1" type="text" maxlength="60">
          </li>
          <li>
            <label for="address1">Address:</label>
            <input id="address1" name="address1" type="text" maxlength="80"
              autocomplete="street-address">
          </li>
        </ul>
      </fieldset>

      <div id="multchoice">
        <fieldset>
          <legend>Type of Presentation</legend>
          <div class="radio-options">
            <span class="radio-choice">
              <input value="1" id="TypeofPres_lec" name="p-type" type="radio">
              <label for="TypeofPres_lec">Lecture</label>
            </span>
            <span class="radio-choice">
              <input value="2" id="TypeofPres_lab" name="p-type" type="radio">
              <label for="TypeofPres_lab">Computer Lab</label>
            </span>
          </div>
        </fieldset>
      </div>

      <button type="submit">Submit your proposal</button>
    </form>
  </main>
</body>
</html>
